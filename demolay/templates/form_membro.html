{% extends "base.html" %}
{% block conteudo %}

<div class="pagina-topo">
  <h2>Novo Membro</h2>
  <a href="{{ url_for('membros') }}" class="btn secundario">← Voltar</a>
</div>

<form method="POST" class="formulario">
  <label>Nome *
    <input type="text" name="nome" required placeholder="Nome completo" />
  </label>
  <label>Cargo *
    <select name="cargo" required>
      <option value="">Selecione...</option>
      <option>Mestre Conselheiro</option>
      <option>Conselheiro Senior</option>
      <option>Chanceler</option>
      <option>Orador</option>
      <option>Secretário</option>
      <option>Tesoureiro</option>
      <option>Capelão</option>
      <option>Guia</option>
      <option>Sentinela</option>
      <option>Membro</option>
    </select>
  </label>
  <label>ID DeMolay
    <input type="text" name="id_demolay" placeholder="Ex: DML-00123" />
  </label>
  <button type="submit" class="btn">Salvar</button>
</form>

{% endblock %}
