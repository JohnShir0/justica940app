{% extends "base.html" %}
{% block conteudo %}

<div class="pagina-topo">
  <h2>Novo Evento</h2>
  <a href="{{ url_for('eventos') }}" class="btn secundario">← Voltar</a>
</div>

<form method="POST" class="formulario">
  <label>Título *
    <input type="text" name="titulo" required placeholder="Nome do evento" />
  </label>
  <label>Data *
    <input type="date" name="data" required />
  </label>
  <label>Descrição
    <textarea name="descricao" rows="4" placeholder="Detalhes do evento..."></textarea>
  </label>
  <button type="submit" class="btn">Salvar</button>
</form>

{% endblock %}
