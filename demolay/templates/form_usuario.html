{% extends "base.html" %}
{% block conteudo %}

<div class="pagina-topo">
  <h2>Novo Usuário</h2>
  <a href="{{ url_for('admin_usuarios') }}" class="btn secundario">← Voltar</a>
</div>

<form method="POST" class="formulario">
  <label>Nome completo
    <input type="text" name="nome" required placeholder="Ex: João Silva" />
  </label>
  <label>Usuário (login)
    <input type="text" name="username" required placeholder="Ex: joaosilva" autocomplete="off" />
  </label>
  <label>Senha
    <input type="password" name="senha" required placeholder="Mínimo 6 caracteres" />
  </label>
  <label>Nível de acesso
    <select name="role">
      <option value="membro">Membro</option>
      <option value="admin">Admin</option>
    </select>
  </label>
  <button type="submit" class="btn">Criar Usuário</button>
</form>

{% endblock %}
