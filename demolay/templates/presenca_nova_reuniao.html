{% extends "base.html" %}
{% block conteudo %}

<div class="pagina-topo">
  <h2>Nova Reunião / Evento</h2>
  <a href="{{ url_for('presenca_reunioes') }}" class="btn secundario">← Voltar</a>
</div>

<form method="POST" class="formulario">
  <label>Título *
    <input type="text" name="titulo" required autofocus placeholder="Ex: Reunião Ordinária de Maio" />
  </label>
  <label>Descrição
    <textarea name="descricao" rows="3" placeholder="Pauta, observações..."></textarea>
  </label>
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
    <label>Data *
      <input type="date" name="data" required />
    </label>
    <label>Horário
      <input type="time" name="hora" value="19:00" />
    </label>
  </div>
  <label>Tipo
    <select name="tipo">
      <option value="reuniao">Reunião</option>
      <option value="evento">Evento</option>
      <option value="cerimonia">Cerimônia</option>
      <option value="assembleia">Assembleia</option>
    </select>
  </label>
  <button type="submit" class="btn">Agendar</button>
</form>

{% endblock %}
